[tox]
envlist = py{310,311,312,313,314}, lint, typecheck
isolated_build = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    requests-mock>=1.11.0
commands =
    pytest --cov=certbot_dns_poweradmin --cov-report=term-missing {posargs}

[testenv:lint]
basepython = python3
skip_install = true
deps =
    ruff>=0.8.0
commands =
    ruff check .
    ruff format --check .

[testenv:typecheck]
basepython = python3
deps =
    mypy>=1.13.0
    types-requests>=2.32.0
commands =
    mypy certbot_dns_poweradmin

[testenv:format]
basepython = python3
skip_install = true
deps =
    ruff>=0.8.0
commands =
    ruff check --fix .
    ruff format .
